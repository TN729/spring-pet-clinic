apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-blue
  namespace: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-petclinic
      harness.io/color: blue
  template:
    metadata:
      labels:
        app: spring-petclinic
        harness.io/color: blue
    spec:
      initContainers:
      - name: wait-for-app-init
        image: busybox
        command: ['sh', '-c', 'echo "Giving app time to initialize..."; sleep 10']
      containers:
      - name: petclinic
        image: tne729/petclinc:main
        ports:
        - containerPort: 80        # ← was 8080
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 80               # ← was 8080
          initialDelaySeconds: 120  # ← increased, app takes ~60-70s to start
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 80               # ← was 8080
          initialDelaySeconds: 90  # ← was 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "h2"
---
apiVersion: v1
kind: Service
metadata:
  name: petclinic-svc-1
  namespace: test-app
  labels:
    harness.io/color: blue
    version: "1"
  annotations:
    harness.io/primary-service: "true"
spec:
  selector:
    app: spring-petclinic
    harness.io/color: blue
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80               # ← was 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: petclinic-svc-stage-2
  namespace: test-app
  labels:
    harness.io/color: green
    version: "2"
  annotations:
    harness.io/stage-service: "true"
spec:
  selector:
    app: spring-petclinic
    harness.io/color: green
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80               # ← was 8080
  type: ClusterIP
